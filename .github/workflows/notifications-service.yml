name: notifications-service

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  notifications:
    name: platform/notifications-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: notifications-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: notifications-service/package-lock.json
      - name: Build event-bus dependency
        working-directory: event-bus
        run: npm ci && npm run build
      - run: npm ci
      - run: npm run audit
      - run: npm run build
      - run: npm test
